<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Certificates — SkillHub</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    .cert-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
    .cert-card { background:var(--white); border:1px solid var(--line); border-radius:var(--radius-lg); padding:20px; display:flex; flex-direction:column; gap:12px; transition:transform .2s,box-shadow .2s; }
    .cert-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
    .cert-card-top { display:flex; align-items:flex-start; gap:14px; }
    .cert-icon { width:48px; height:48px; border-radius:12px; display:grid; place-items:center; font-size:20px; flex-shrink:0; }
    .cert-verified   { background:var(--green-bg); color:var(--green); border:1px solid var(--green-line); }
    .cert-pending    { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-line); }
    .cert-rejected   { background:var(--red-bg); color:var(--red); border:1px solid var(--red-line); }
    .cert-name   { font-size:15px; font-weight:700; color:var(--ink); margin-bottom:3px; }
    .cert-issuer { font-size:13px; color:var(--muted); }
    .cert-dates  { font-size:12px; color:var(--muted-2); display:flex; gap:16px; flex-wrap:wrap; }
    .cert-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line-2); padding-top:12px; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><img src="images/meritlives_logo.png" class="sidebar-logo" alt="SkillHub Logo"></div>
      <span class="sidebar-brand-name">SkillHub</span>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="toggleDropdown('userMenu')">
        <img src="" alt="Avatar" />
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role">student</div>
        </div>
        <i class="fas fa-ellipsis-h"></i>
      </div>
      <div class="dropdown-menu" id="userMenu" style="bottom:70px;top:auto">
        <div class="dropdown-item" onclick="location.href='settings.html'"><i class="fas fa-gear"></i>Settings</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="SkillHub.logout()"><i class="fas fa-sign-out-alt"></i>Sign Out</div>
      </div>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbarTitle">Certificates</span>
      <div class="topbar-search"><i class="fas fa-search"></i><input type="text" placeholder="Search…" /></div>
      <div class="topbar-actions">
        <div class="dropdown notif-wrap" style="position:relative">
          <button class="icon-btn" onclick="toggleDropdown('notifPanel')"><i class="fas fa-bell"></i><span class="notif-dot" id="notifDot" style="display:none"></span></button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-header"><span>Notifications</span><a onclick="markAllRead()">Mark all read</a></div>
            <div class="notif-list" id="notifList"></div>
          </div>
        </div>
        <img class="avatar-btn" id="topbarAvatar" src="" alt="Avatar" onclick="location.href='settings.html'" />
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <div class="page-header-left"><h1>Certificates</h1><p>Your verified credentials</p></div>
        <button class="btn btn-primary" onclick="document.getElementById('addCertModal').classList.add('open')"><i class="fas fa-plus"></i> Add Certificate</button>
      </div>

      <!-- Stats row -->
      <div class="stats-grid" style="margin-bottom:22px" id="certStats">
        <div class="stat-card"><div class="stat-icon green"><i class="fas fa-certificate"></i></div><div><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total</div></div></div>
        <div class="stat-card"><div class="stat-icon brand"><i class="fas fa-check-circle"></i></div><div><div class="stat-value" id="statVerified">—</div><div class="stat-label">Verified</div></div></div>
        <div class="stat-card"><div class="stat-icon amber"><i class="fas fa-clock"></i></div><div><div class="stat-value" id="statPending">—</div><div class="stat-label">Pending</div></div></div>
      </div>

      <div class="cert-grid" id="certGrid">
        <div class="skeleton" style="height:160px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:160px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:160px;border-radius:var(--radius-lg)"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Certificate Modal -->
<div class="modal-overlay" id="addCertModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 class="modal-title">Add Certificate</h3>
      <button class="modal-close" onclick="document.getElementById('addCertModal').classList.remove('open')"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">Certificate Name *</label>
      <div class="input-wrap"><i class="input-icon fas fa-certificate"></i><input class="form-input" id="cName" placeholder="e.g. AWS Cloud Practitioner" /></div>
    </div>
    <div class="form-group">
      <label class="form-label">Issuing Organisation *</label>
      <div class="input-wrap"><i class="input-icon fas fa-building"></i><input class="form-input" id="cIssuer" placeholder="e.g. Amazon Web Services" /></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Issue Date *</label>
        <input class="form-input no-icon" id="cIssueDate" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Expiry Date</label>
        <input class="form-input no-icon" id="cExpiry" type="date" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Credential ID</label>
      <div class="input-wrap"><i class="input-icon fas fa-id-badge"></i><input class="form-input" id="cCredId" placeholder="e.g. AWS-CP-2024-123" /></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="document.getElementById('addCertModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCert()"><i class="fas fa-save"></i> Save</button>
    </div>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/layout.js"></script>
<script>
const user = SkillHub.requireAuth();
if (user) buildLayout({ page: 'certificates', role: user.role, title: 'Certificates' });

async function loadCerts() {
  try {
    const d = await SkillHub._fetch('/certificates');
    const certs = d?.data || [];
    const verified = certs.filter(c=>c.status==='verified').length;
    const pending  = certs.filter(c=>c.status==='pending').length;
    document.getElementById('statTotal').textContent   = certs.length;
    document.getElementById('statVerified').textContent = verified;
    document.getElementById('statPending').textContent  = pending;
    renderCerts(certs);
  } catch { toast('Failed to load certificates','error'); }
}

function renderCerts(certs) {
  const grid = document.getElementById('certGrid');
  if (!certs.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-certificate"></i><h3>No certificates yet</h3><p>Add your professional certifications to get verified</p><button class="btn btn-primary" onclick="document.getElementById('addCertModal').classList.add('open')">Add Certificate</button></div>`;
    return;
  }
  grid.innerHTML = certs.map(c => {
    const iconClass = {verified:'cert-verified',pending:'cert-pending',rejected:'cert-rejected'}[c.status]||'cert-pending';
    const iconName  = {verified:'fa-check-circle',pending:'fa-clock',rejected:'fa-times-circle'}[c.status]||'fa-clock';
    const statusChip = {verified:'chip-green',pending:'chip-amber',rejected:'chip-red'}[c.status]||'chip-amber';
    return `
    <div class="cert-card">
      <div class="cert-card-top">
        <div class="cert-icon ${iconClass}"><i class="fas ${iconName}"></i></div>
        <div>
          <div class="cert-name">${esc(c.name)}</div>
          <div class="cert-issuer">${esc(c.issuer)}</div>
        </div>
      </div>
      <div class="cert-dates">
        <span><i class="fas fa-calendar-alt" style="margin-right:4px;color:var(--muted-2)"></i>Issued ${fmtDate(c.issueDate)}</span>
        ${c.expiryDate ? `<span><i class="fas fa-calendar-times" style="margin-right:4px;color:var(--muted-2)"></i>Expires ${fmtDate(c.expiryDate)}</span>` : ''}
      </div>
      ${c.credentialId ? `<div style="font-size:12px;color:var(--muted-2)"><i class="fas fa-id-badge" style="margin-right:4px"></i>${esc(c.credentialId)}</div>` : ''}
      <div class="cert-footer">
        <span class="chip ${statusChip}" style="text-transform:capitalize">${c.status}</span>
        <button class="btn btn-sm btn-danger" onclick="deleteCert('${c.id}')"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function fmtDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }

async function saveCert() {
  const name = document.getElementById('cName').value.trim();
  const issuer = document.getElementById('cIssuer').value.trim();
  const issueDate = document.getElementById('cIssueDate').value;
  if (!name||!issuer||!issueDate) { toast('Name, issuer and issue date required','warning'); return; }
  try {
    const r = await SkillHub._fetch('/certificates', { method:'POST', body:JSON.stringify({ name, issuer, issueDate, expiryDate:document.getElementById('cExpiry').value||undefined, credentialId:document.getElementById('cCredId').value||undefined }) });
    if (r?.success) { toast('Certificate added — pending verification','success'); document.getElementById('addCertModal').classList.remove('open'); loadCerts(); }
    else toast(r?.message||'Failed','error');
  } catch { toast('Failed to save','error'); }
}

async function deleteCert(id) {
  if (!confirm('Remove this certificate?')) return;
  try {
    const r = await SkillHub._fetch(`/certificates/${id}`, { method:'DELETE' });
    if (r?.success) { toast('Certificate removed','info'); loadCerts(); }
  } catch { toast('Failed','error'); }
}

loadCerts();
</script>
</body>
</html>
