<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Jobs — SkillHub</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <span class="sidebar-brand-name">SkillHub</span>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="toggleDropdown('userMenu')">
        <img src="" alt="Avatar" />
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role">student</div>
        </div>
        <i class="fas fa-ellipsis-h"></i>
      </div>
      <div class="dropdown-menu" id="userMenu" style="bottom:70px;top:auto">
        <div class="dropdown-item" onclick="location.href='settings.html'"><i class="fas fa-gear"></i>Settings</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="SkillHub.logout()"><i class="fas fa-sign-out-alt"></i>Sign Out</div>
      </div>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbarTitle">Jobs</span>
      <div class="topbar-search"><i class="fas fa-search"></i><input type="text" placeholder="Search jobs…" /></div>
      <div class="topbar-actions">
        <div class="dropdown notif-wrap" style="position:relative">
          <button class="icon-btn" onclick="toggleDropdown('notifPanel')"><i class="fas fa-bell"></i><span class="notif-dot" id="notifDot" style="display:none"></span></button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-header"><span>Notifications</span><a onclick="markAllRead()">Mark all read</a></div>
            <div class="notif-list" id="notifList"></div>
          </div>
        </div>
        <img class="avatar-btn" id="topbarAvatar" src="" alt="Avatar" onclick="location.href='settings.html'" />
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Job Board</h1>
          <p>Opportunities matched to your skills</p>
        </div>
        <button class="btn btn-primary" onclick="location.href='#matches'"><i class="fas fa-magic"></i> Top Matches</button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('all',this)">All Jobs</button>
        <button class="tab-btn" onclick="switchTab('matches',this)"><i class="fas fa-bolt" style="color:var(--amber)"></i> My Matches</button>
        <button class="tab-btn" onclick="switchTab('saved',this)">Saved</button>
        <button class="tab-btn" onclick="switchTab('applications',this)">Applied</button>
      </div>

      <div class="filter-bar">
        <input class="search-input-bar" id="jobSearch" placeholder="Search jobs or companies…" oninput="filterJobs()" />
        <select class="filter-select" id="typeFilter" onchange="filterJobs()">
          <option value="">All Types</option>
          <option>Full-time</option><option>Part-time</option><option>Contract</option><option>Remote</option><option>Internship</option>
        </select>
        <select class="filter-select" id="locFilter" onchange="filterJobs()">
          <option value="">All Locations</option>
          <option>Lagos</option><option>Abuja</option><option>Remote</option>
        </select>
      </div>

      <div class="jobs-list" id="jobsList">
        <div class="card"><div class="skeleton" style="height:80px"></div></div>
        <div class="card"><div class="skeleton" style="height:80px"></div></div>
        <div class="card"><div class="skeleton" style="height:80px"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Apply Modal -->
<div class="modal-overlay" id="applyModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Apply to <span id="applyJobTitle"></span></h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">Cover Letter <span style="color:var(--muted)">(optional)</span></label>
      <textarea class="form-textarea" id="coverLetter" placeholder="Tell them why you're a great fit…" style="min-height:140px"></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="submitApplyBtn" onclick="submitApply()"><i class="fas fa-paper-plane"></i> Submit Application</button>
    </div>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/layout.js"></script>
<script>
const user = SkillHub.requireAuth();
if (user) buildLayout({ page: 'jobs', role: user.role, title: 'Jobs' });

let allJobs = [], currentTab = 'all', selectedJobId = null;

async function loadJobs(tab = 'all') {
  currentTab = tab;
  const list = document.getElementById('jobsList');
  list.innerHTML = '<div class="card"><div class="skeleton" style="height:80px"></div></div>'.repeat(3);
  try {
    let endpoint = '/jobs';
    if (tab === 'matches')      endpoint = '/jobs/matches';
    else if (tab === 'saved')   endpoint = '/jobs/saved';
    else if (tab === 'applications') endpoint = '/jobs/applications';
    const d = await SkillHub._fetch(endpoint);
    allJobs = d?.data || [];
    renderJobs(allJobs);
  } catch { toast('Failed to load jobs', 'error'); }
}

function renderJobs(jobs) {
  const list = document.getElementById('jobsList');
  if (!jobs.length) {
    list.innerHTML = `<div class="empty-state"><i class="fas fa-briefcase"></i><h3>No jobs found</h3><p>${currentTab === 'saved' ? 'Save jobs to review later' : currentTab === 'applications' ? 'You haven\'t applied to any jobs yet' : 'Try different filters'}</p></div>`;
    return;
  }
  if (currentTab === 'applications') {
    list.innerHTML = jobs.map(a => `
      <div class="job-card">
        <div class="job-card-logo"><i class="fas fa-building"></i></div>
        <div style="flex:1">
          <div class="job-card-title">${esc(a.job?.title || 'Job')}</div>
          <div class="job-card-meta">${esc(a.job?.company)} · ${esc(a.job?.location)} · ${esc(a.job?.type)}</div>
          <div class="job-card-tags"><span class="chip chip-${statusColor(a.status)}">${a.status}</span></div>
        </div>
        <div class="job-card-right">
          <div style="font-size:12px;color:var(--muted)">${relTime(a.appliedAt)}</div>
        </div>
      </div>`).join('');
    return;
  }
  list.innerHTML = jobs.map(j => `
    <div class="job-card">
      <div class="job-card-logo"><i class="fas fa-building"></i></div>
      <div style="flex:1">
        <div class="job-card-title">${esc(j.title)}</div>
        <div class="job-card-meta">${esc(j.company)} · ${esc(j.location)} · ${esc(j.type)}</div>
        <div class="job-card-tags">
          ${(j.skills||[]).slice(0,4).map(s=>`<span class="job-tag">${esc(s)}</span>`).join('')}
          ${j.match ? `<span class="chip chip-green" style="font-size:11px">${j.match}% match</span>` : ''}
          ${j.applied ? '<span class="chip chip-brand" style="font-size:11px">Applied</span>' : ''}
        </div>
      </div>
      <div class="job-card-right">
        <div class="job-salary">${esc(j.salary||'Negotiable')}</div>
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn btn-sm ${j.saved?'btn-primary':'btn-secondary'}" onclick="toggleSave('${j.id}',this)" title="${j.saved?'Unsave':'Save'}">
            <i class="fas fa-bookmark"></i>
          </button>
          ${!j.applied ? `<button class="btn btn-sm btn-primary" onclick="openApply('${j.id}','${esc(j.title)}')"><i class="fas fa-paper-plane"></i> Apply</button>`
            : '<span style="font-size:12px;color:var(--green)"><i class="fas fa-check"></i> Applied</span>'}
        </div>
      </div>
    </div>`).join('');
}

function statusColor(s) {
  return {pending:'amber',reviewed:'blue',shortlisted:'green',rejected:'red',accepted:'green'}[s]||'muted';
}

function filterJobs() {
  const q   = document.getElementById('jobSearch').value.toLowerCase();
  const typ = document.getElementById('typeFilter').value;
  const loc = document.getElementById('locFilter').value;
  renderJobs(allJobs.filter(j =>
    (!q   || j.title?.toLowerCase().includes(q) || j.company?.toLowerCase().includes(q)) &&
    (!typ || j.type === typ) &&
    (!loc || j.location?.toLowerCase().includes(loc.toLowerCase()))
  ));
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs(tab);
}

function openApply(id, title) {
  selectedJobId = id;
  document.getElementById('applyJobTitle').textContent = title;
  document.getElementById('coverLetter').value = '';
  document.getElementById('applyModal').classList.add('open');
}
function closeModal() { document.getElementById('applyModal').classList.remove('open'); }

async function toggleSave(id, btn) {
  try {
    const r = await SkillHub._fetch(`/jobs/${id}/save`, { method: 'POST' });
    if (r?.data?.saved) { btn.classList.replace('btn-secondary','btn-primary'); toast('Job saved','success'); }
    else { btn.classList.replace('btn-primary','btn-secondary'); toast('Job removed','info'); }
  } catch { toast('Failed','error'); }
}

async function submitApply() {
  const btn = document.getElementById('submitApplyBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting…';
  try {
    const r = await SkillHub._fetch(`/jobs/${selectedJobId}/apply`, {
      method: 'POST',
      body: JSON.stringify({ coverLetter: document.getElementById('coverLetter').value })
    });
    if (r?.success) { toast('Application submitted! 🎉', 'success'); closeModal(); loadJobs(currentTab); }
    else toast(r?.message || 'Failed to apply', 'error');
  } catch { toast('Failed to apply', 'error'); }
  btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Application';
}

loadJobs();
</script>
</body>
</html>
