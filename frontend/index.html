<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Dashboard — SkillHub</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    .welcome-banner { background: linear-gradient(135deg, var(--brand) 0%, #7c3aed 100%); border-radius: var(--radius-lg); padding: 28px 32px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; color: #fff; position: relative; overflow: hidden; }
    .welcome-banner::before { content: ''; position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; border-radius: 50%; background: rgba(255,255,255,.08); }
    .welcome-banner::after  { content: ''; position: absolute; bottom: -40px; right: 80px; width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,.05); }
    .welcome-text h2 { font-size: 22px; color: #fff; margin-bottom: 5px; }
    .welcome-text p { color: rgba(255,255,255,.75); font-size: 14px; }
    .welcome-coins { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.15); backdrop-filter: blur(8px); border-radius: 12px; padding: 12px 18px; position: relative; z-index: 1; }
    .welcome-coins i { font-size: 22px; color: #fbbf24; }
    .coins-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; }
    .coins-lbl { font-size: 11px; color: rgba(255,255,255,.7); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .col-span-2 { grid-column: span 2; }

    /* Profile strength */
    .strength-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .strength-pct { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--brand); }

    /* Course mini-card */
    .course-mini { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line-2); }
    .course-mini:last-child { border-bottom: none; padding-bottom: 0; }
    .course-thumb { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; background: var(--brand-bg); flex-shrink: 0; }
    .course-mini-title { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 3px; line-height: 1.3; }
    .course-mini-sub { font-size: 12px; color: var(--muted); }
    .course-mini-prog { margin-top: 5px; }

    /* Activity item */
    .activity-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line-2); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 12px; flex-shrink: 0; background: var(--brand-bg); color: var(--brand); }
    .activity-msg { font-size: 13px; color: var(--ink-3); line-height: 1.4; }
    .activity-time { font-size: 11px; color: var(--muted-2); margin-top: 2px; }

    /* Job match card */
    .job-match { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--line-2); }
    .job-match:last-child { border-bottom: none; }
    .job-co-logo { width: 38px; height: 38px; border-radius: 9px; background: var(--surface); border: 1px solid var(--line); display: grid; place-items: center; font-size: 14px; color: var(--brand); flex-shrink: 0; }
    .job-match-title { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
    .job-match-co { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .match-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
    .match-pill.high { background: var(--green-bg); color: #15803d; }
    .match-pill.med  { background: var(--amber-bg); color: #92400e; }

    @media (max-width: 900px) { .grid-2,.grid-3 { grid-template-columns: 1fr; } .col-span-2 { grid-column: span 1; } }
    @media (max-width: 480px) {
      .welcome-coins { width: 100%; justify-content: center; }
      .course-thumb { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <span class="sidebar-brand-name">SkillHub</span>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="toggleDropdown('userMenu')">
        <img src="" alt="Avatar" />
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role">student</div>
        </div>
        <i class="fas fa-ellipsis-h"></i>
      </div>
      <div class="dropdown-menu" id="userMenu" style="bottom:70px;top:auto">
        <div class="dropdown-item" onclick="location.href='settings.html'"><i class="fas fa-gear"></i>Settings</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="SkillHub.logout()"><i class="fas fa-sign-out-alt"></i>Sign Out</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-search">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search courses, jobs, skills…" />
      </div>
      <div class="topbar-actions">
        <div class="dropdown notif-wrap" style="position:relative">
          <button class="icon-btn" onclick="toggleDropdown('notifPanel')">
            <i class="fas fa-bell"></i>
            <span class="notif-dot" id="notifDot" style="display:none"></span>
          </button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-header">
              <span>Notifications</span>
              <a onclick="markAllRead()">Mark all read</a>
            </div>
            <div class="notif-list" id="notifList"></div>
          </div>
        </div>
        <img class="avatar-btn" id="topbarAvatar" src="" alt="Avatar" onclick="location.href='settings.html'" />
      </div>
    </header>

    <!-- PAGE -->
    <div class="page">
      <!-- Welcome Banner -->
      <div class="welcome-banner" id="welcomeBanner">
        <div class="welcome-text">
          <h2 id="welcomeMsg">Good morning! 👋</h2>
          <p>Here's your learning overview for today.</p>
        </div>
        <div class="welcome-coins">
          <i class="fas fa-coins"></i>
          <div>
            <div class="coins-val" id="coinsVal">—</div>
            <div class="coins-lbl">Merit Coins</div>
          </div>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-icon brand skeleton" style="width:44px;height:44px"></div><div class="stat-body"><div class="skeleton" style="width:60px;height:22px;margin-bottom:4px"></div><div class="skeleton" style="width:100px;height:12px"></div></div></div>
        <div class="stat-card"><div class="stat-icon green skeleton" style="width:44px;height:44px"></div><div class="stat-body"><div class="skeleton" style="width:60px;height:22px;margin-bottom:4px"></div><div class="skeleton" style="width:100px;height:12px"></div></div></div>
        <div class="stat-card"><div class="stat-icon amber skeleton" style="width:44px;height:44px"></div><div class="stat-body"><div class="skeleton" style="width:60px;height:22px;margin-bottom:4px"></div><div class="skeleton" style="width:100px;height:12px"></div></div></div>
        <div class="stat-card"><div class="stat-icon red skeleton" style="width:44px;height:44px"></div><div class="stat-body"><div class="skeleton" style="width:60px;height:22px;margin-bottom:4px"></div><div class="skeleton" style="width:100px;height:12px"></div></div></div>
      </div>

      <!-- Content Grid -->
      <div class="grid-2" style="margin-bottom:16px">
        <!-- Active Courses -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Active Courses</span>
            <a href="courses.html" class="btn btn-sm btn-secondary">View all</a>
          </div>
          <div id="activeCourses"><div class="skeleton" style="height:60px;margin-bottom:8px"></div><div class="skeleton" style="height:60px"></div></div>
        </div>

        <!-- Profile Strength + Activity -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="card">
            <div class="card-header"><span class="card-title">Profile Strength</span></div>
            <div class="strength-row">
              <div>
                <div id="strengthPct" class="strength-pct">—%</div>
                <div style="font-size:12px;color:var(--muted)" id="strengthLabel">Complete your profile</div>
              </div>
              <a href="settings.html" class="btn btn-sm btn-secondary">Improve</a>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="strengthBar" style="width:0%"></div></div>
            <div id="strengthTips" style="margin-top:12px;font-size:12px;color:var(--muted)"></div>
          </div>
        </div>
      </div>

      <!-- Second row: Activity + Job Matches -->
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><span class="card-title">Recent Activity</span></div>
          <div id="activityFeed"><div class="skeleton" style="height:40px;margin-bottom:6px"></div><div class="skeleton" style="height:40px;margin-bottom:6px"></div><div class="skeleton" style="height:40px"></div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Top Job Matches</span>
            <a href="jobs.html" class="btn btn-sm btn-secondary">Browse all</a>
          </div>
          <div id="jobMatches"><div class="skeleton" style="height:60px;margin-bottom:6px"></div><div class="skeleton" style="height:60px"></div></div>
        </div>
      </div>
    </div><!-- /page -->
  </div><!-- /main -->
</div><!-- /app-shell -->

<script src="scripts/api.js"></script>
<script src="scripts/layout.js"></script>
<script>
  const user = SkillHub.requireAuth(['student', 'employer', 'admin']);
  if (user) {
    buildLayout({ page: 'dashboard', role: user.role, title: 'Dashboard' });

    // Welcome message by time
    const hr = new Date().getHours();
    const greeting = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('welcomeMsg').textContent = `${greeting}, ${user.firstName}! 👋`;

    loadDashboard();
  }

  async function loadDashboard() {
    try {
      const [dash, jobs] = await Promise.all([SkillHub.dashboard(), SkillHub.jobs('?limit=3')]);

      if (dash?.success) {
        const { stats, recentActivity } = dash.data;

        // Merit coins
        document.getElementById('coinsVal').textContent = (stats.meritCoins || 0).toLocaleString();

        // Stats cards
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card"><div class="stat-icon brand"><i class="fas fa-book-open"></i></div><div class="stat-body"><div class="stat-value">${stats.coursesEnrolled}</div><div class="stat-label">Courses Enrolled</div><div class="stat-delta up"><i class="fas fa-arrow-up"></i> ${stats.activeCourses} active</div></div></div>
          <div class="stat-card"><div class="stat-icon green"><i class="fas fa-certificate"></i></div><div class="stat-body"><div class="stat-value">${stats.certificates}</div><div class="stat-label">Certificates</div><div class="stat-delta up"><i class="fas fa-check"></i> Verified</div></div></div>
          <div class="stat-card"><div class="stat-icon amber"><i class="fas fa-briefcase"></i></div><div class="stat-body"><div class="stat-value">${stats.jobApplications}</div><div class="stat-label">Applications</div><div class="stat-delta up"><i class="fas fa-paper-plane"></i> Submitted</div></div></div>
          <div class="stat-card"><div class="stat-icon red"><i class="fas fa-fire"></i></div><div class="stat-body"><div class="stat-value">${stats.profileStrength}%</div><div class="stat-label">Profile Score</div><div class="stat-delta ${stats.profileStrength >= 70 ? 'up' : 'down'}">${stats.profileStrength >= 70 ? '✓ Looking great!' : '▲ Needs work'}</div></div></div>
        `;

        // Profile strength
        const s = stats.profileStrength;
        document.getElementById('strengthPct').textContent = `${s}%`;
        document.getElementById('strengthBar').style.width = `${s}%`;
        document.getElementById('strengthLabel').textContent = s >= 80 ? 'Excellent — employers love this!' : s >= 60 ? 'Good, keep improving' : 'Add more info to stand out';
        document.getElementById('strengthTips').innerHTML = s < 100 ? `<i class="fas fa-lightbulb" style="color:var(--amber)"></i> Tip: Add your ${s < 50 ? 'bio, location and skills' : s < 70 ? 'GitHub and LinkedIn links' : 'a project to reach 100%'} to boost your score.` : '<i class="fas fa-star" style="color:var(--amber)"></i> Perfect! Your profile is complete.';

        // Activity
        document.getElementById('activityFeed').innerHTML = (recentActivity || []).length
          ? recentActivity.map(a => `
              <div class="activity-item">
                <div class="activity-dot"><i class="fas fa-${a.icon || 'circle'}"></i></div>
                <div><div class="activity-msg">${a.message}</div><div class="activity-time">${a.time}</div></div>
              </div>`).join('')
          : '<div class="empty-state" style="padding:20px"><i class="fas fa-clock"></i><p>No recent activity yet</p></div>';
      }

      // Active courses
      const coursesR = await SkillHub.courses('?enrolled=true');
      const enrolled = (coursesR?.data || []).filter(c => c.enrolled && c.progress > 0 && c.progress < 100).slice(0, 3);
      document.getElementById('activeCourses').innerHTML = enrolled.length
        ? enrolled.map(c => `
            <div class="course-mini">
              <img class="course-thumb" src="${c.thumbnail}" alt="${c.title}" />
              <div style="flex:1;min-width:0">
                <div class="course-mini-title">${c.title}</div>
                <div class="course-mini-sub">${c.provider} · ${c.level}</div>
                <div class="course-mini-prog">
                  <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                    <span style="font-size:11px;color:var(--muted)">Progress</span>
                    <span style="font-size:11px;font-weight:600;color:var(--brand)">${c.progress}%</span>
                  </div>
                  <div class="progress-bar"><div class="progress-fill" style="width:${c.progress}%"></div></div>
                </div>
              </div>
            </div>`).join('')
        : '<div class="empty-state" style="padding:20px"><i class="fas fa-book-open"></i><p>No active courses</p><a href="courses.html" class="btn btn-sm btn-primary">Browse Courses</a></div>';

      // Job matches
      if (jobs?.success) {
        const topJobs = jobs.data.slice(0, 3);
        document.getElementById('jobMatches').innerHTML = topJobs.length
          ? topJobs.map(j => `
              <div class="job-match">
                <div class="job-co-logo"><i class="fas fa-building"></i></div>
                <div style="flex:1;min-width:0">
                  <div class="job-match-title">${j.title}</div>
                  <div class="job-match-co">${j.company} · ${j.location}</div>
                  <div style="display:flex;align-items:center;gap:6px">
                    <span class="match-pill ${j.match >= 80 ? 'high' : 'med'}"><i class="fas fa-bolt"></i>${j.match}% match</span>
                    <span style="font-size:11px;color:var(--muted)">${j.type}</span>
                  </div>
                </div>
                <a href="jobs.html" class="btn btn-sm btn-secondary" style="flex-shrink:0">View</a>
              </div>`).join('')
          : '<div class="empty-state" style="padding:20px"><i class="fas fa-briefcase"></i><p>No job matches yet</p></div>';
      }

    } catch(e) {
      console.error(e);
      toast('Failed to load dashboard. Is the backend running?', 'error');
    }
  }
</script>
</body>
</html>
