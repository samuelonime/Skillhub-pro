<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Talent Pool — SkillHub</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    /* ── Layout ── */
    .talent-layout { display:grid; grid-template-columns:280px 1fr; gap:24px; align-items:start; }
    @media(max-width:900px) { .talent-layout { grid-template-columns:1fr; } }

    /* ── Filter sidebar ── */
    .filter-panel { background:var(--white); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px; position:sticky; top:calc(var(--topbar-h) + 20px); }
    .filter-panel h3 { font-size:15px; font-weight:700; margin-bottom:18px; }
    .filter-section { margin-bottom:20px; }
    .filter-label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:8px; display:block; }
    .filter-input { width:100%; padding:9px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:13.5px; font-family:inherit; color:var(--ink); background:var(--surface); outline:none; transition:border-color .2s; }
    .filter-input:focus { border-color:var(--brand); background:var(--white); }
    .skill-tags-input { display:flex; flex-wrap:wrap; gap:5px; padding:8px; border:1.5px solid var(--line); border-radius:10px; background:var(--surface); min-height:42px; cursor:text; transition:border-color .2s; }
    .skill-tags-input:focus-within { border-color:var(--brand); background:var(--white); }
    .skill-tags-input input { border:none; outline:none; background:transparent; font-size:13px; font-family:inherit; color:var(--ink); min-width:80px; flex:1; }
    .skill-tag-chip { display:flex; align-items:center; gap:4px; background:var(--brand-bg); color:var(--brand); padding:3px 8px; border-radius:6px; font-size:12px; font-weight:500; }
    .skill-tag-chip button { border:none; background:none; color:var(--brand); cursor:pointer; padding:0; font-size:11px; line-height:1; }
    .check-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer; font-size:13.5px; color:var(--ink-2); }
    .check-row input { accent-color:var(--brand); width:15px; height:15px; cursor:pointer; }
    .range-row { display:flex; align-items:center; gap:8px; }
    .range-row input[type=range] { flex:1; accent-color:var(--brand); }
    .range-val { font-size:13px; font-weight:600; color:var(--brand); min-width:32px; text-align:right; }
    .filter-actions { display:flex; gap:8px; margin-top:4px; }
    .filter-actions button { flex:1; }

    /* ── Results header ── */
    .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
    .results-count { font-size:14px; color:var(--muted); }
    .results-count strong { color:var(--ink); }
    .sort-select { padding:8px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:13px; font-family:inherit; color:var(--ink); background:var(--white); outline:none; }

    /* ── Candidate cards ── */
    .candidates-list { display:flex; flex-direction:column; gap:14px; }
    .candidate-card { background:var(--white); border:1px solid var(--line); border-radius:var(--radius-lg); padding:20px; display:flex; align-items:flex-start; gap:18px; transition:border-color .18s, box-shadow .18s; cursor:pointer; }
    .candidate-card:hover { border-color:var(--brand-3); box-shadow:var(--shadow); }
    .candidate-avatar { position:relative; flex-shrink:0; }
    .candidate-avatar img { width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid var(--line); }
    .avatar-placeholder { width:56px; height:56px; border-radius:50%; background:var(--brand-bg); display:grid; place-items:center; font-size:20px; font-weight:700; color:var(--brand); flex-shrink:0; border:2px solid var(--line); }
    .online-dot { position:absolute; bottom:2px; right:2px; width:12px; height:12px; border-radius:50%; background:var(--green); border:2px solid var(--white); }

    .candidate-info { flex:1; min-width:0; }
    .candidate-name-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
    .candidate-name { font-size:16px; font-weight:700; color:var(--ink); }
    .match-badge { display:flex; align-items:center; gap:4px; padding:3px 10px; border-radius:100px; font-size:12px; font-weight:700; }
    .match-badge.high   { background:var(--green-bg); color:#15803d; }
    .match-badge.medium { background:var(--amber-bg); color:#92400e; }
    .match-badge.low    { background:var(--surface);  color:var(--muted); }
    .candidate-title { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .candidate-bio   { font-size:13px; color:var(--muted); margin-bottom:10px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    .candidate-skills { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
    .skill-pill { padding:3px 10px; border-radius:6px; font-size:12px; font-weight:500; background:var(--surface); color:var(--ink-2); border:1px solid var(--line); display:flex; align-items:center; gap:4px; }
    .skill-pill.verified { background:var(--brand-bg); color:var(--brand); border-color:var(--brand-3); }
    .skill-pill.verified i { color:var(--brand); font-size:10px; }

    .candidate-meta { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .candidate-meta-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); }
    .candidate-meta-item i { font-size:11px; }

    .candidate-actions { display:flex; flex-direction:column; gap:8px; flex-shrink:0; align-items:flex-end; }
    .shortlist-btn { width:36px; height:36px; border-radius:10px; border:1.5px solid var(--line); background:var(--white); color:var(--muted); font-size:14px; display:grid; place-items:center; cursor:pointer; transition:all .16s; }
    .shortlist-btn:hover   { border-color:var(--amber); color:var(--amber); }
    .shortlist-btn.active  { background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }
    .profile-bar { width:80px; }
    .profile-bar-label { font-size:10px; color:var(--muted); margin-bottom:3px; text-align:right; }
    .profile-bar-track { height:4px; background:var(--line); border-radius:100px; overflow:hidden; }
    .profile-bar-fill  { height:100%; border-radius:100px; background:linear-gradient(90deg, var(--brand), var(--brand-2)); }

    /* ── Tabs ── */
    .tab-bar { display:flex; gap:4px; background:var(--surface); padding:4px; border-radius:12px; width:fit-content; margin-bottom:22px; border:1px solid var(--line); }
    .tab-btn { padding:8px 20px; border:none; background:transparent; border-radius:9px; font-size:13.5px; font-weight:500; font-family:inherit; color:var(--muted); cursor:pointer; transition:all .16s; }
    .tab-btn.on { background:var(--white); color:var(--ink); font-weight:600; box-shadow:var(--shadow-sm); }

    /* ── Pagination ── */
    .pagination { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:24px; }
    .page-btn { width:36px; height:36px; border-radius:9px; border:1.5px solid var(--line); background:var(--white); font-size:13px; font-weight:500; cursor:pointer; display:grid; place-items:center; transition:all .16s; color:var(--ink-2); }
    .page-btn:hover { border-color:var(--brand); color:var(--brand); }
    .page-btn.on    { background:var(--brand); border-color:var(--brand); color:#fff; }
    .page-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Candidate Detail Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--white); border-radius:var(--radius-xl); width:100%; max-width:720px; max-height:90vh; overflow-y:auto; transform:scale(.96) translateY(12px); transition:transform .2s; }
    .modal-overlay.open .modal { transform:scale(1) translateY(0); }
    .modal-head { padding:28px 28px 0; display:flex; align-items:flex-start; gap:18px; }
    .modal-close { margin-left:auto; width:34px; height:34px; border:none; background:var(--surface); border-radius:9px; cursor:pointer; color:var(--muted); font-size:15px; display:grid; place-items:center; flex-shrink:0; }
    .modal-close:hover { background:var(--line); }
    .modal-body { padding:20px 28px 28px; }
    .modal-section { margin-top:22px; }
    .modal-section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .modal-section-title::after { content:''; flex:1; height:1px; background:var(--line); }

    .cert-chip { display:flex; align-items:center; gap:8px; padding:10px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; }
    .cert-chip i { color:var(--amber); font-size:14px; }
    .cert-chip-title { font-size:13.5px; font-weight:600; }
    .cert-chip-provider { font-size:12px; color:var(--muted); }

    .project-card { border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; }
    .project-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .project-desc  { font-size:12.5px; color:var(--muted); line-height:1.5; margin-bottom:8px; }
    .project-links { display:flex; gap:8px; }

    .resume-box { display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border-radius:10px; border:1px solid var(--line); }
    .resume-box i { font-size:22px; color:var(--red); }
    .resume-box-info { flex:1; }
    .resume-box-name { font-size:13.5px; font-weight:600; }
    .resume-box-meta { font-size:12px; color:var(--muted); }

    /* ── Empty & skeleton ── */
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-state i { font-size:42px; color:var(--line); margin-bottom:14px; display:block; }
    .empty-state h3 { font-size:17px; margin-bottom:6px; }
    .empty-state p  { font-size:13.5px; color:var(--muted); }
    .skeleton { background:linear-gradient(90deg, var(--line) 25%, var(--surface) 50%, var(--line) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-candidate { height:120px; border-radius:var(--radius-lg); }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><img src="images/meritlives_logo.png" class="sidebar-logo" alt="SkillHub Logo"></div>
      <span class="sidebar-brand-name">SkillHub</span>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser">
        <img id="sidebarAvatar" src="" alt="avatar" />
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarName">—</div>
          <div class="sidebar-user-role" id="sidebarRole">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title">Talent Pool</span>
      <div class="topbar-actions">
        <button class="icon-btn" id="notifBtn">
          <i class="fas fa-bell"></i>
          <span class="notif-dot" id="notifDot" style="display:none"></span>
        </button>
        <img class="avatar-btn" id="topbarAvatar" src="" alt="Avatar" onclick="location.href='settings.html'" />
      </div>
    </header>

    <main class="page">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Talent Pool</h1>
          <p>Search and discover verified candidates for your roles</p>
        </div>
        <button class="btn btn-secondary" onclick="switchTab('shortlisted')">
          <i class="fas fa-star"></i> Shortlisted
          <span id="shortlist-count" style="font-size:11px;opacity:.7"></span>
        </button>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn on" id="tab-search"      onclick="switchTab('search')">Search Candidates</button>
        <button class="tab-btn"    id="tab-shortlisted" onclick="switchTab('shortlisted')">My Shortlist</button>
      </div>

      <!-- SEARCH TAB -->
      <div id="view-search">
        <div class="talent-layout">

          <!-- Filter sidebar -->
          <div class="filter-panel">
            <h3><i class="fas fa-sliders-h" style="color:var(--brand);margin-right:8px"></i>Filters</h3>

            <div class="filter-section">
              <span class="filter-label">Skills</span>
              <div class="skill-tags-input" id="skillTagsInput" onclick="document.getElementById('skillInput').focus()">
                <input type="text" id="skillInput" placeholder="Type skill + Enter" onkeydown="handleSkillInput(event)" />
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px">Press Enter to add each skill</div>
            </div>

            <div class="filter-section">
              <span class="filter-label">Location</span>
              <input type="text" class="filter-input" id="filterLocation" placeholder="e.g. Lagos, Abuja" />
            </div>

            <div class="filter-section">
              <span class="filter-label">Minimum MeritCoins</span>
              <div class="range-row">
                <input type="range" id="filterCoins" min="0" max="500" step="50" value="0"
                  oninput="document.getElementById('coinsVal').textContent = this.value" />
                <span class="range-val" id="coinsVal">0</span>
              </div>
            </div>

            <div class="filter-section">
              <label class="check-row">
                <input type="checkbox" id="filterCertified" />
                Verified certificates only
              </label>
              <label class="check-row">
                <input type="checkbox" id="filterResume" />
                Has resume uploaded
              </label>
            </div>

            <div class="filter-actions">
              <button class="btn btn-primary" onclick="runSearch()">
                <i class="fas fa-search"></i> Search
              </button>
              <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            </div>
          </div>

          <!-- Results -->
          <div>
            <div class="results-header">
              <div class="results-count" id="resultsCount">Search for candidates</div>
              <select class="sort-select" id="sortSelect" onchange="runSearch()">
                <option value="match">Best Match</option>
                <option value="strength">Profile Strength</option>
                <option value="coins">Most MeritCoins</option>
                <option value="newest">Newest</option>
              </select>
            </div>

            <div class="candidates-list" id="candidatesList">
              <div class="empty-state">
                <i class="fas fa-users"></i>
                <h3>Find your next hire</h3>
                <p>Use the filters to search the talent pool</p>
                <button class="btn btn-primary" style="margin-top:14px" onclick="runSearch()">
                  <i class="fas fa-search"></i> Browse All Candidates
                </button>
              </div>
            </div>

            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>

      <!-- SHORTLIST TAB -->
      <div id="view-shortlisted" style="display:none">
        <div class="candidates-list" id="shortlistedList">
          <div class="skeleton skel-candidate"></div>
          <div class="skeleton skel-candidate"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Candidate Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-head" id="modalHead">
      <div class="skeleton" style="width:60px;height:60px;border-radius:50%"></div>
      <div style="flex:1"><div class="skeleton" style="height:20px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:40%"></div></div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="skeleton" style="height:80px;border-radius:10px"></div>
    </div>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/layout.js"></script>
<script>
  const user = SkillHub.requireAuth(['employer', 'admin']);
  buildLayout({ page: 'talent', title: 'Talent Pool' });

  // ── State ─────────────────────────────────────────────────────────────────
  let skillTags     = [];
  let currentPage   = 1;
  let totalPages    = 1;
  let shortlistSet  = new Set();
  let currentTab    = 'search';

  // ── Skill tag input ───────────────────────────────────────────────────────
  function handleSkillInput(e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const val = document.getElementById('skillInput').value.trim();
    if (!val || skillTags.includes(val)) return;
    skillTags.push(val);
    renderSkillTags();
    document.getElementById('skillInput').value = '';
  }

  function removeSkillTag(idx) {
    skillTags.splice(idx, 1);
    renderSkillTags();
  }

  function renderSkillTags() {
    const wrap = document.getElementById('skillTagsInput');
    const input = document.getElementById('skillInput');
    wrap.querySelectorAll('.skill-tag-chip').forEach(el => el.remove());
    skillTags.forEach((tag, i) => {
      const chip = document.createElement('div');
      chip.className = 'skill-tag-chip';
      chip.innerHTML = `${esc(tag)} <button onclick="removeSkillTag(${i})" type="button">&times;</button>`;
      wrap.insertBefore(chip, input);
    });
  }

  function resetFilters() {
    skillTags = [];
    renderSkillTags();
    document.getElementById('filterLocation').value = '';
    document.getElementById('filterCoins').value    = '0';
    document.getElementById('coinsVal').textContent  = '0';
    document.getElementById('filterCertified').checked = false;
    document.getElementById('filterResume').checked    = false;
    document.getElementById('candidatesList').innerHTML = `
      <div class="empty-state">
        <i class="fas fa-users"></i>
        <h3>Filters cleared</h3>
        <p>Click Search to browse all candidates</p>
      </div>`;
    document.getElementById('resultsCount').textContent = 'Search for candidates';
    document.getElementById('pagination').innerHTML = '';
  }

  // ── Search ────────────────────────────────────────────────────────────────
  async function runSearch(page = 1) {
    currentPage = page;
    const list = document.getElementById('candidatesList');
    list.innerHTML = [1,2,3,4,5].map(() =>
      `<div class="skeleton skel-candidate"></div>`).join('');
    document.getElementById('pagination').innerHTML = '';

    const params = new URLSearchParams({ page, limit: 15 });
    if (skillTags.length)                                   params.set('skills',    skillTags.join(','));
    if (document.getElementById('filterLocation').value)    params.set('location',  document.getElementById('filterLocation').value);
    if (+document.getElementById('filterCoins').value > 0)  params.set('minCoins',  document.getElementById('filterCoins').value);
    if (document.getElementById('filterCertified').checked) params.set('certified', 'true');

    try {
      const res  = await SkillHub.get(`/talent?${params}`);
      const { candidates, pagination } = res.data;
      totalPages = pagination.pages;

      document.getElementById('resultsCount').innerHTML =
        `<strong>${pagination.total}</strong> candidate${pagination.total !== 1 ? 's' : ''} found`;

      if (!candidates.length) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-user-slash"></i>
            <h3>No candidates found</h3>
            <p>Try broader search terms or remove some filters</p>
          </div>`;
        return;
      }

      list.innerHTML = candidates.map(c => candidateCard(c)).join('');
      renderPagination(pagination);
    } catch (err) {
      list.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-circle"></i>
          <h3>Search failed</h3>
          <p>Please try again</p>
        </div>`;
    }
  }

  function candidateCard(c) {
    const matchClass = c.matchScore >= 70 ? 'high' : c.matchScore >= 40 ? 'medium' : 'low';
    const initials   = `${c.firstName?.[0] ?? ''}${c.lastName?.[0] ?? ''}`.toUpperCase();
    const avatarHtml = c.avatar
      ? `<img src="${esc(c.avatar)}" alt="${esc(c.fullName)}" />`
      : `<div class="avatar-placeholder">${initials}</div>`;

    const skillsHtml = (c.skills || []).slice(0, 5).map(s => `
      <span class="skill-pill ${s.verified ? 'verified' : ''}">
        ${s.verified ? '<i class="fas fa-check-circle"></i>' : ''}
        ${esc(s.name)}
      </span>`).join('');

    const isShortlisted = shortlistSet.has(c.id);

    return `
      <div class="candidate-card" onclick="openCandidateModal('${c.id}')">
        <div class="candidate-avatar">
          ${avatarHtml}
        </div>
        <div class="candidate-info">
          <div class="candidate-name-row">
            <div class="candidate-name">${esc(c.fullName)}</div>
            <div class="match-badge ${matchClass}">
              <i class="fas fa-bolt"></i> ${c.matchScore}% match
            </div>
          </div>
          ${c.location ? `<div class="candidate-title"><i class="fas fa-map-marker-alt" style="color:var(--muted-2);font-size:11px"></i> ${esc(c.location)}</div>` : ''}
          ${c.bio ? `<div class="candidate-bio">${esc(c.bio)}</div>` : ''}
          <div class="candidate-skills">${skillsHtml}</div>
          <div class="candidate-meta">
            <div class="candidate-meta-item"><i class="fas fa-certificate"></i>${c.certCount} verified cert${c.certCount !== 1 ? 's' : ''}</div>
            <div class="candidate-meta-item"><i class="fas fa-briefcase"></i>${c.projectCount} project${c.projectCount !== 1 ? 's' : ''}</div>
            <div class="candidate-meta-item"><i class="fas fa-coins" style="color:var(--amber)"></i>${c.meritCoins} coins</div>
            ${c.resume ? '<div class="candidate-meta-item" style="color:var(--green)"><i class="fas fa-file-pdf"></i> Resume</div>' : ''}
          </div>
        </div>
        <div class="candidate-actions" onclick="event.stopPropagation()">
          <button class="shortlist-btn ${isShortlisted ? 'active' : ''}"
            title="${isShortlisted ? 'Remove from shortlist' : 'Add to shortlist'}"
            onclick="toggleShortlist('${c.id}', this)">
            <i class="fas fa-star"></i>
          </button>
          <div class="profile-bar">
            <div class="profile-bar-label">${c.profileStrength ?? 0}%</div>
            <div class="profile-bar-track">
              <div class="profile-bar-fill" style="width:${c.profileStrength ?? 0}%"></div>
            </div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openCandidateModal('${c.id}')">
            View Profile
          </button>
        </div>
      </div>`;
  }

  // ── Shortlist toggle ──────────────────────────────────────────────────────
  async function toggleShortlist(candidateId, btn) {
    btn.disabled = true;
    try {
      const res = await SkillHub.post(`/talent/${candidateId}/shortlist`, {});
      if (res.data.shortlisted) {
        shortlistSet.add(candidateId);
        btn.classList.add('active');
        btn.title = 'Remove from shortlist';
        toast('Added to shortlist ⭐', 'success');
      } else {
        shortlistSet.delete(candidateId);
        btn.classList.remove('active');
        btn.title = 'Add to shortlist';
        toast('Removed from shortlist', 'info');
      }
    } catch { toast('Failed to update shortlist', 'error'); }
    btn.disabled = false;
  }

  // ── Candidate modal ───────────────────────────────────────────────────────
  async function openCandidateModal(id) {
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Show skeleton
    document.getElementById('modalHead').innerHTML = `
      <div class="skeleton" style="width:60px;height:60px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="skeleton" style="height:20px;width:55%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:14px;width:35%"></div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>`;
    document.getElementById('modalBody').innerHTML =
      `<div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:12px"></div>
       <div class="skeleton" style="height:120px;border-radius:10px"></div>`;

    try {
      const res = await SkillHub.get(`/talent/${id}`);
      renderCandidateModal(res.data);
    } catch {
      document.getElementById('modalBody').innerHTML =
        `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Failed to load profile</h3></div>`;
    }
  }

  function renderCandidateModal(c) {
    const initials  = `${c.firstName?.[0] ?? ''}${c.lastName?.[0] ?? ''}`.toUpperCase();
    const avatarHtml = c.avatar
      ? `<img src="${esc(c.avatar)}" alt="${esc(c.fullName)}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--line)">`
      : `<div class="avatar-placeholder" style="width:64px;height:64px;font-size:22px">${initials}</div>`;

    const isShortlisted = shortlistSet.has(c.id);

    document.getElementById('modalHead').innerHTML = `
      ${avatarHtml}
      <div style="flex:1;min-width:0">
        <div style="font-size:20px;font-weight:700;margin-bottom:4px">${esc(c.fullName)}</div>
        <div style="font-size:13px;color:var(--muted);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          ${c.location ? `<span><i class="fas fa-map-marker-alt"></i> ${esc(c.location)}</span>` : ''}
          <span><i class="fas fa-coins" style="color:var(--amber)"></i> ${c.meritCoins} MeritCoins</span>
          <span><i class="fas fa-signal"></i> ${c.profileStrength ?? 0}% profile</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;align-items:flex-start">
        <button class="shortlist-btn ${isShortlisted ? 'active' : ''}" title="Shortlist"
          onclick="toggleShortlist('${c.id}', this)"><i class="fas fa-star"></i></button>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>`;

    let html = '';

    // Bio
    if (c.bio) {
      html += `<p style="font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px">${esc(c.bio)}</p>`;
    }

    // Resume
    if (c.resume?.fileUrl) {
      html += `
        <div class="modal-section">
          <div class="modal-section-title">Resume <span style="font-size:11px;font-weight:500;color:var(--green);text-transform:none">Available</span></div>
          <div class="resume-box">
            <i class="fas fa-file-pdf"></i>
            <div class="resume-box-info">
              <div class="resume-box-name">${esc(c.resume.fileName || 'Resume.pdf')}</div>
              <div class="resume-box-meta">Updated ${new Date(c.resume.updatedAt).toLocaleDateString()}</div>
            </div>
            <a href="${esc(c.resume.fileUrl)}" target="_blank" class="btn btn-primary btn-sm">
              <i class="fas fa-download"></i> Download
            </a>
          </div>
        </div>`;
    }

    // Skills
    if (c.skills?.length) {
      html += `
        <div class="modal-section">
          <div class="modal-section-title">Skills (${c.skills.length})</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${c.skills.map(s => `
              <span class="skill-pill ${s.verified ? 'verified' : ''}">
                ${s.verified ? '<i class="fas fa-check-circle"></i>' : ''}
                ${esc(s.name)}
                <span style="font-size:10px;opacity:.7">${esc(s.level)}</span>
              </span>`).join('')}
          </div>
        </div>`;
    }

    // Certificates
    if (c.certificates?.length) {
      html += `
        <div class="modal-section">
          <div class="modal-section-title">Verified Certificates (${c.certificates.length})</div>
          ${c.certificates.map(cert => `
            <div class="cert-chip">
              <i class="fas fa-award"></i>
              <div style="flex:1">
                <div class="cert-chip-title">${esc(cert.title)}</div>
                <div class="cert-chip-provider">${esc(cert.provider)} · ${cert.issuedAt ? new Date(cert.issuedAt).toLocaleDateString() : ''}</div>
              </div>
              ${cert.credentialUrl ? `<a href="${esc(cert.credentialUrl)}" target="_blank" class="btn btn-secondary btn-sm">Verify</a>` : ''}
            </div>`).join('')}
        </div>`;
    }

    // Projects
    if (c.projects?.length) {
      html += `
        <div class="modal-section">
          <div class="modal-section-title">Projects (${c.projects.length})</div>
          ${c.projects.map(p => `
            <div class="project-card">
              <div class="project-title">${esc(p.title)}</div>
              ${p.description ? `<div class="project-desc">${esc(p.description)}</div>` : ''}
              ${p.techStack ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
                ${p.techStack.split(',').map(t => `<span class="skill-pill">${esc(t.trim())}</span>`).join('')}
              </div>` : ''}
              <div class="project-links">
                ${p.liveUrl   ? `<a href="${esc(p.liveUrl)}" target="_blank" class="btn btn-secondary btn-sm"><i class="fas fa-external-link-alt"></i> Live</a>` : ''}
                ${p.githubUrl ? `<a href="${esc(p.githubUrl)}" target="_blank" class="btn btn-secondary btn-sm"><i class="fab fa-github"></i> Code</a>` : ''}
              </div>
            </div>`).join('')}
        </div>`;
    }

    // Completed Skill Paths
    if (c.enrolledPaths?.length) {
      html += `
        <div class="modal-section">
          <div class="modal-section-title">Completed Skill Paths</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${c.enrolledPaths.map(e => `
              <span class="skill-pill verified">
                <i class="fas fa-road"></i> ${esc(e.path.title)}
              </span>`).join('')}
          </div>
        </div>`;
    }

    // Contact / Hire
    html += `
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" style="flex:1" onclick="toast('Message feature coming soon!','info')">
          <i class="fas fa-envelope"></i> Send Message
        </button>
        <button class="btn btn-secondary" onclick="toast('Invite sent!','success')">
          <i class="fas fa-paper-plane"></i> Invite to Apply
        </button>
      </div>`;

    document.getElementById('modalBody').innerHTML = html;
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Shortlisted tab ───────────────────────────────────────────────────────
  async function loadShortlisted() {
    const list = document.getElementById('shortlistedList');
    list.innerHTML = [1,2,3].map(() => `<div class="skeleton skel-candidate"></div>`).join('');
    try {
      const res = await SkillHub.get('/talent/my/shortlisted');
      const items = res.data || [];
      document.getElementById('shortlist-count').textContent = items.length ? `(${items.length})` : '';

      if (!items.length) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-star"></i>
            <h3>No shortlisted candidates yet</h3>
            <p>Click the star icon on any candidate to save them here</p>
            <button class="btn btn-primary" style="margin-top:14px" onclick="switchTab('search')">Browse Candidates</button>
          </div>`;
        return;
      }

      // Mark them in set
      items.forEach(i => shortlistSet.add(i.id));
      list.innerHTML = items.map(c => candidateCard({ ...c, matchScore: 0 })).join('');
    } catch {
      list.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Failed to load</h3></div>`;
    }
  }

  // ── Pagination ────────────────────────────────────────────────────────────
  function renderPagination(pagination) {
    const { page, pages } = pagination;
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="runSearch(${page - 1})" ${page === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
    for (let i = 1; i <= pages; i++) {
      if (i === 1 || i === pages || Math.abs(i - page) <= 1) {
        html += `<button class="page-btn ${i === page ? 'on' : ''}" onclick="runSearch(${i})">${i}</button>`;
      } else if (Math.abs(i - page) === 2) {
        html += `<span style="color:var(--muted);padding:0 4px">…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="runSearch(${page + 1})" ${page === pages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
    document.getElementById('pagination').innerHTML = html;
  }

  // ── Tab switch ────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-search').classList.toggle('on',      tab === 'search');
    document.getElementById('tab-shortlisted').classList.toggle('on', tab === 'shortlisted');
    document.getElementById('view-search').style.display      = tab === 'search'      ? 'block' : 'none';
    document.getElementById('view-shortlisted').style.display = tab === 'shortlisted' ? 'block' : 'none';
    if (tab === 'shortlisted') loadShortlisted();
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  // Initial load — browse all candidates
  runSearch();
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
