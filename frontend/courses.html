<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Courses — SkillHub</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <span class="sidebar-brand-name">SkillHub</span>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="toggleDropdown('userMenu')">
        <img src="" alt="Avatar" />
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role">student</div>
        </div>
        <i class="fas fa-ellipsis-h"></i>
      </div>
      <div class="dropdown-menu" id="userMenu" style="bottom:70px;top:auto">
        <div class="dropdown-item" onclick="location.href='settings.html'"><i class="fas fa-gear"></i>Settings</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="SkillHub.logout()"><i class="fas fa-sign-out-alt"></i>Sign Out</div>
      </div>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbarTitle">Courses</span>
      <div class="topbar-search"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search courses…" /></div>
      <div class="topbar-actions">
        <div class="dropdown notif-wrap" style="position:relative">
          <button class="icon-btn" onclick="toggleDropdown('notifPanel')"><i class="fas fa-bell"></i><span class="notif-dot" id="notifDot" style="display:none"></span></button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-header"><span>Notifications</span><a onclick="markAllRead()">Mark all read</a></div>
            <div class="notif-list" id="notifList"></div>
          </div>
        </div>
        <img class="avatar-btn" id="topbarAvatar" src="" alt="Avatar" onclick="location.href='settings.html'" />
      </div>
    </header>
    <div class="page">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Courses</h1>
          <p>Expand your skills with world-class learning</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('all', this)">All Courses</button>
        <button class="tab-btn" onclick="switchTab('enrolled', this)">My Courses</button>
        <button class="tab-btn" onclick="switchTab('recommended', this)">Recommended</button>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <input class="search-input-bar" id="courseSearch" placeholder="Search courses…" oninput="filterCourses()" />
        <select class="filter-select" id="catFilter" onchange="filterCourses()">
          <option value="">All Categories</option>
          <option>Frontend</option><option>Backend</option><option>Data</option>
          <option>Cloud</option><option>Design</option>
        </select>
        <select class="filter-select" id="levelFilter" onchange="filterCourses()">
          <option value="">All Levels</option>
          <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
        </select>
      </div>

      <div class="courses-grid" id="coursesGrid">
        <!-- skeleton -->
        ${[1,2,3,4,5,6].map(() => `<div class="card" style="padding:0;overflow:hidden"><div class="skeleton" style="height:160px;border-radius:0"></div><div style="padding:16px"><div class="skeleton" style="height:16px;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:60%"></div></div></div>`).join('')}
      </div>
    </div>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/layout.js"></script>
<script>
const user = SkillHub.requireAuth();
if (user) buildLayout({ page: 'courses', role: user.role, title: 'Courses' });

let allCourses = [];
let currentTab = 'all';

async function loadCourses(tab = 'all') {
  currentTab = tab;
  try {
    let data;
    if (tab === 'enrolled')    data = await SkillHub._fetch('/courses/enrolled');
    else if (tab === 'recommended') data = await SkillHub._fetch('/courses/recommended');
    else                       data = await SkillHub._fetch('/courses');
    allCourses = data?.data || [];
    renderCourses(allCourses);
  } catch(e) { toast('Failed to load courses', 'error'); }
}

function renderCourses(courses) {
  const grid = document.getElementById('coursesGrid');
  if (!courses.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-book-open"></i><h3>No courses found</h3><p>Try adjusting your filters</p></div>`;
    return;
  }
  grid.innerHTML = courses.map(c => `
    <div class="course-card">
      <img class="course-card-thumb" src="${c.thumbnail || 'https://placehold.co/320x180/4f46e5/white?text=Course'}" alt="${esc(c.title)}" />
      <div class="course-card-body">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span class="chip chip-brand" style="font-size:11px">${esc(c.level)}</span>
          ${c.isPremium ? '<span class="chip chip-amber" style="font-size:11px">⭐ Premium</span>' : ''}
          ${c.enrolled  ? '<span class="chip chip-green" style="font-size:11px">✓ Enrolled</span>' : ''}
        </div>
        <div class="course-card-title">${esc(c.title)}</div>
        <div class="course-card-meta">${esc(c.provider)} · ${esc(c.duration)}</div>
        ${c.enrolled && c.progress > 0 ? `<div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${c.progress}%"></div></div><div style="font-size:11px;color:var(--brand);margin-bottom:8px">${c.progress}% complete</div>` : ''}
        <div class="course-card-footer">
          <div class="course-rating"><i class="fas fa-star"></i> ${c.rating || '4.7'} <span style="color:var(--muted);font-weight:400">(${(c.enrollCount||0).toLocaleString()})</span></div>
          ${c.enrolled
            ? `<button class="btn btn-sm btn-primary" onclick="continueLearn('${c.id}')">Continue</button>`
            : `<button class="btn btn-sm ${c.isPremium ? 'btn-secondary' : 'btn-primary'}" onclick="enroll('${c.id}', this)">${c.isPremium ? '₦' + c.price.toLocaleString() : 'Enroll Free'}</button>`}
        </div>
      </div>
    </div>`).join('');
}

function filterCourses() {
  const q = document.getElementById('courseSearch').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const lvl = document.getElementById('levelFilter').value;
  renderCourses(allCourses.filter(c =>
    (!q   || c.title.toLowerCase().includes(q) || c.provider.toLowerCase().includes(q)) &&
    (!cat || c.category === cat) &&
    (!lvl || c.level === lvl)
  ));
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCourses(tab);
}

async function enroll(id, btn) {
  btn.disabled = true; btn.textContent = 'Enrolling…';
  try {
    const r = await SkillHub._fetch(`/courses/${id}/enroll`, { method: 'POST' });
    if (r?.success) { toast('Enrolled! +10 Merit Coins 🎉', 'success'); loadCourses(currentTab); }
    else toast(r?.message || 'Enrollment failed', 'error');
  } catch { toast('Enrollment failed', 'error'); btn.disabled = false; btn.textContent = 'Enroll Free'; }
}

function continueLearn(id) { toast('Continuing course…', 'info'); }

loadCourses();
</script>
</body>
</html>
